# .golangci.yml
# https://golangci-lint.run/usage/configuration/

version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - nakedret
    - prealloc
    - unconvert
    - bodyclose
    - contextcheck
    - noctx
  settings:
    govet:
      enable:
        - shadow
    gosec:
      excludes:
        - G104

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/jhonsferg/traverse

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
