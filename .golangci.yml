# .golangci.yml
# Standard format for maximum compatibility with both v1 and v2 runners

version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly
  tests: true

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - nakedret
    - prealloc
    - unconvert
    - bodyclose
    - contextcheck
    - noctx

linters-settings:
  govet:
    enable:
      - shadow
  gosec:
    excludes:
      - G104
  # Formatting is usually handled by separate actions, 
  # but we can enable gofmt here if the linter supports it
  # gofmt:
  #   simplify: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-use-default: false
