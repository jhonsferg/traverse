name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.go-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ["1.25"]

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: false

      - name: Pin toolchain to installed Go
        run: go env -w GOTOOLCHAIN=local

      # -- Core module -------------------------------------------------------
      - name: Test core module
        run: go test -v -race -count=1 "-coverprofile=coverage.out" -covermode=atomic ./...
        shell: bash

      # -- Extension modules (each has its own go.mod) -----------------------
      - name: Test extension modules
        shell: bash
        run: |
          set -e
          find ext -name "go.mod" | while read modfile; do
            dir=$(dirname "$modfile")
            echo ""
            echo "=== Testing $dir ==="
            pkgs=$(cd "$dir" && go list ./... 2>/dev/null || true)
            if [ -z "$pkgs" ]; then
              echo "No Go packages in $dir - skipping"
              continue
            fi
            (cd "$dir" && go test -v -race -count=1 -coverprofile=coverage_ext.out ./...)

            # Check coverage threshold
            if [ -f "$dir/coverage_ext.out" ]; then
              pct=$(go tool cover -func="$dir/coverage_ext.out" 2>/dev/null | grep '^total' | awk '{print $3}' | tr -d '%' | cut -d. -f1)
              if [ -n "$pct" ]; then
                echo "$dir coverage: ${pct}%"
                if [ "$pct" -lt 60 ]; then
                  echo "::warning file=$dir::Coverage is ${pct}% (below 60% threshold)"
                fi
              fi
              rm -f "$dir/coverage_ext.out"
            fi
          done

      - name: Filter coverage to library packages only
        if: matrix.go-version == '1.25' && matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          grep -v -E "^github\.com/jhonsferg/traverse/(cmd|examples|benchmarks|tools|internal/encoder|internal/tokenizer)/" coverage.out > coverage_lib.out
          mv coverage_lib.out coverage.out

      - name: Upload coverage artifact
        if: matrix.go-version == '1.25' && matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: coverage.out
          retention-days: 1

      - name: Upload coverage to Codecov
        if: matrix.go-version == '1.25' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.out
          flags: unittests
          name: traverse-coverage
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: "1.25"
          cache: false

      - name: Pin toolchain
        run: go env -w GOTOOLCHAIN=local

      - name: Download modules (core)
        env:
          GOWORK: "off"
        run: go mod download

      - name: golangci-lint (core)
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v6
        env:
          GOWORK: "off"
        with:
          version: latest
          args: --timeout=5m ./...

      - name: golangci-lint (extensions)
        env:
          GOWORK: "off"
        run: |
          find ext -name "go.mod" | while read modfile; do
            dir=$(dirname "$modfile")
            echo "=== Linting $dir ==="
            (cd "$dir" && golangci-lint run --timeout=3m ./...) || true
          done

  vet:
    name: Vet
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: "1.25"
          cache: false

      - name: Pin toolchain
        run: go env -w GOTOOLCHAIN=local

      - name: go vet (core)
        run: go vet ./...

      - name: go vet (extensions)
        run: |
          set -e
          find ext -name "go.mod" | while read modfile; do
            dir=$(dirname "$modfile")
            echo "=== Vet $dir ==="
            pkgs=$(cd "$dir" && go list ./... 2>/dev/null || true)
            if [ -z "$pkgs" ]; then
              echo "No Go packages in $dir - skipping"
              continue
            fi
            (cd "$dir" && go vet ./...)
          done

  build-examples:
    name: Build Examples
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: "1.25"
          cache: false

      - name: Pin toolchain
        run: go env -w GOTOOLCHAIN=local

      - name: Build examples module
        env:
          GOWORK: "off"
        run: cd examples && go build ./...

  # -- Auto Tag ---------------------------------------------------------------
  # Runs only on direct pushes to master, only after ALL checks above pass.
  # - Detects which Go modules were changed in the commit.
  # - Computes the next semver from the highest existing tag for each module.
  # - Bump type follows Conventional Commits:
  #     BREAKING CHANGE / type! -> major
  #     feat                    -> minor
  #     everything else         -> patch
  # - Creates lightweight tags and pushes them.
  # - Notifies pkg.go.dev so the new version is indexed immediately.
  auto-tag:
    name: Auto Tag
    needs: [test, lint, vet, build-examples]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0   # need full history to list all existing tags

      - name: Tag changed modules and notify pkg.go.dev
        run: |
          set -eo pipefail

          # -- 1. Determine bump type from Conventional Commits ---------------
          SUBJECT=$(git log -1 --format="%s")
          BODY=$(git log -1 --format="%b")

          if printf '%s\n%s' "$SUBJECT" "$BODY" | grep -qE 'BREAKING[[:space:]]CHANGE' \
          || printf '%s' "$SUBJECT" | grep -qE '^[a-z]+(\([^)]*\))?!:'; then
            BUMP=major
          elif printf '%s' "$SUBJECT" | grep -qE '^feat(\([^)]*\))?:'; then
            BUMP=minor
          else
            BUMP=patch
          fi
          echo "Bump type: $BUMP  (commit: $SUBJECT)"

          # -- 2. Skip if HEAD is already tagged ------------------------------
          if git tag --points-at HEAD | grep -q .; then
            echo "HEAD already tagged: $(git tag --points-at HEAD | tr '\n' ' ') - skipping"
            exit 0
          fi

          # -- 3. Detect which Go modules were touched ------------------------
          # Walk each changed file upward until we find a go.mod directory.
          # Only tag on changes to Go source, module files, or README.
          declare -A AFFECTED

          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            mapfile -t CHANGED < <(git diff --name-only HEAD~1 HEAD)
          else
            mapfile -t CHANGED < <(git diff-tree --no-commit-id -r --name-only HEAD)
          fi

          echo "Changed files: ${CHANGED[*]}"

          for f in "${CHANGED[@]}"; do
            case "$f" in
              *.go|go.mod|go.sum|README.md) ;;
              *) continue ;;
            esac

            d=$(dirname "$f")
            while true; do
              if [[ "$d" == "." ]]; then
                AFFECTED["."]=1
                break
              fi
              if [[ -f "$d/go.mod" ]]; then
                AFFECTED["$d"]=1
                break
              fi
              d=$(dirname "$d")
            done
          done

          if [[ ${#AFFECTED[@]} -eq 0 ]]; then
            echo "No Go code or dependency changes detected - nothing to tag"
            exit 0
          fi
          echo "Affected modules: ${!AFFECTED[*]}"

          # -- 4. Compute and create tags -------------------------------------
          TAGS_CREATED=()

          for mod_dir in "${!AFFECTED[@]}"; do
            if [[ "$mod_dir" == "." ]]; then
              latest=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' \
                         | grep -v '/' | sed 's/^v//' | sort -V | tail -1 || true)
              tag_prefix="v"
            else
              latest=$(git tag -l "${mod_dir}/v[0-9]*.[0-9]*.[0-9]*" \
                         | sed "s|^${mod_dir}/v||" | sort -V | tail -1 || true)
              tag_prefix="${mod_dir}/v"
            fi

            if [[ -z "$latest" ]]; then
              next="0.1.0"
            else
              IFS='.' read -r major minor patch <<< "$latest"
              case "$BUMP" in
                major) major=$(( major + 1 )); minor=0; patch=0 ;;
                minor) minor=$(( minor + 1 )); patch=0 ;;
                patch) patch=$(( patch + 1 )) ;;
              esac
              next="${major}.${minor}.${patch}"
            fi

            new_tag="${tag_prefix}${next}"

            if git tag -l "$new_tag" | grep -q .; then
              echo "Tag $new_tag already exists - skipping"
              continue
            fi

            echo "Creating tag: $new_tag  (was: ${latest:-none})"
            git tag "$new_tag"
            TAGS_CREATED+=("$new_tag")
          done

          if [[ ${#TAGS_CREATED[@]} -eq 0 ]]; then
            echo "No new tags created"
            exit 0
          fi

          # -- 5. Push tags --------------------------------------------------
          git push origin "${TAGS_CREATED[@]}"
          echo "Pushed: ${TAGS_CREATED[*]}"

          # -- 6. Notify pkg.go.dev ------------------------------------------
          for tag in "${TAGS_CREATED[@]}"; do
            if [[ "$tag" != */* ]]; then
              fetch_url="https://pkg.go.dev/fetch/github.com/jhonsferg/traverse@${tag}"
            else
              ver="${tag##*/}"
              mod_path="${tag%/v*}"
              fetch_url="https://pkg.go.dev/fetch/github.com/jhonsferg/traverse/${mod_path}@${ver}"
            fi

            echo "Notifying pkg.go.dev: $fetch_url"
            http_code=$(curl -sf -o /dev/null -w "%{http_code}" \
              -X POST -H "Content-Length: 0" "$fetch_url" || true)
            echo "  Response: $http_code"
          done

  # -- Update Badges ---------------------------------------------------------
  badges:
    name: Update Badges
    needs: [test]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: "1.25"
          cache: false

      - name: Pin toolchain
        run: go env -w GOTOOLCHAIN=local

      - name: Download coverage artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: coverage

      - name: Compute coverage percentage and color
        id: cov
        run: |
          PCT=$(go tool cover -func=coverage.out | grep '^total' | awk '{print $3}' | tr -d '%')
          INT=${PCT%.*}
          if   [ "$INT" -ge 80 ]; then COLOR=brightgreen
          elif [ "$INT" -ge 70 ]; then COLOR=green
          elif [ "$INT" -ge 60 ]; then COLOR=yellow
          elif [ "$INT" -ge 50 ]; then COLOR=orange
          else                         COLOR=red
          fi
          echo "pct=$PCT"   >> "$GITHUB_OUTPUT"
          echo "color=$COLOR" >> "$GITHUB_OUTPUT"
          echo "Coverage: ${PCT}% -> $COLOR"

      - name: Push coverage.json to badges branch
        run: |
          PCT="${{ steps.cov.outputs.pct }}"
          COLOR="${{ steps.cov.outputs.color }}"

          printf '{"schemaVersion":1,"label":"coverage","message":"%s%%","color":"%s"}\n' \
            "$PCT" "$COLOR" > /tmp/coverage.json

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin badges 2>/dev/null || true

          if git ls-remote --exit-code --heads origin badges > /dev/null 2>&1; then
            git checkout -B badges origin/badges
          else
            git checkout --orphan badges
            git rm -rf . --quiet 2>/dev/null || true
          fi

          cp /tmp/coverage.json coverage.json
          git add coverage.json

          if git diff --cached --quiet; then
            echo "Badge unchanged - skipping push"
            exit 0
          fi

          git commit -m "chore: update coverage badge [skip ci]"
          git push origin badges

  # Validate codecov configuration
  validate-codecov:
    name: Validate Codecov Config
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      
      - name: Validate codecov.yml
        run: |
          if [ ! -f codecov.yml ]; then
            echo "❌ codecov.yml not found"
            exit 1
          fi
          echo "✅ codecov.yml found"
          
          # Check required sections
          for section in coverage component_management comment; do
            if grep -q "^$section:" codecov.yml; then
              echo "✅ Section '$section' found"
            else
              echo "⚠️  Section '$section' missing (optional)"
            fi
          done

