name: Auto Version & Release

on:
  push:
    branches: [master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/dependabot.yml'

permissions:
  contents: write

jobs:
  version-and-release:
    name: Bump version, tag and release
    runs-on: ubuntu-latest
    # Skip release-prep commits and bot-generated commits to prevent loops
    if: |
      !startsWith(github.event.head_commit.message, 'chore(release)') &&
      github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          fetch-depth: 0

      - name: Determine version bump
        id: bump
        run: |
          LATEST_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | grep -v '/' | sort -V | tail -1)
          [ -z "$LATEST_TAG" ] && LATEST_TAG="v0.0.0"
          echo "Latest tag: $LATEST_TAG"

          COMMITS=$(git log "${LATEST_TAG}..HEAD" --format="%s %b" 2>/dev/null || git log --format="%s %b")
          echo "Commits since ${LATEST_TAG}:"
          echo "$COMMITS"

          BUMP="none"
          if echo "$COMMITS" | grep -qE '^[a-z]+(\([^)]*\))?!:|BREAKING.CHANGE'; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE '^feat(\([^)]*\))?:'; then
            BUMP="minor"
          elif echo "$COMMITS" | grep -qE '^(fix|perf|refactor)(\([^)]*\))?:'; then
            BUMP="patch"
          fi

          echo "Bump type: $BUMP"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"

      - name: Compute new version
        id: version
        if: steps.bump.outputs.bump != 'none'
        run: |
          LATEST="${{ steps.bump.outputs.latest_tag }}"
          VERSION="${LATEST#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          case "${{ steps.bump.outputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "New tag: $NEW_TAG"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        if: steps.bump.outputs.bump != 'none'
        run: |
          CURR_TAG="${{ steps.version.outputs.new_tag }}"
          PREV_TAG="${{ steps.bump.outputs.latest_tag }}"
          RANGE="${PREV_TAG}..HEAD"
          COMPARE_URL="**Full changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${CURR_TAG}"

          {
            echo "## What's Changed in ${CURR_TAG}"
            echo ""

            BREAKING=$(git log "$RANGE" --format="%s" | grep -E '^[a-z]+(\([^)]*\))?!:' || true)
            [ -n "$BREAKING" ] && echo "### ⚠️ Breaking Changes" && while IFS= read -r l; do [ -n "$l" ] && echo "- $l"; done <<< "$BREAKING" && echo ""

            FEATS=$(git log "$RANGE" --format="%s" | grep -E '^feat(\([^)]*\))?:' | sed 's/^feat[^:]*: //' || true)
            [ -n "$FEATS" ] && echo "### ✨ New Features" && while IFS= read -r l; do [ -n "$l" ] && echo "- $l"; done <<< "$FEATS" && echo ""

            FIXES=$(git log "$RANGE" --format="%s" | grep -E '^fix(\([^)]*\))?:' | sed 's/^fix[^:]*: //' || true)
            [ -n "$FIXES" ] && echo "### 🐛 Bug Fixes" && while IFS= read -r l; do [ -n "$l" ] && echo "- $l"; done <<< "$FIXES" && echo ""

            PERF=$(git log "$RANGE" --format="%s" | grep -E '^perf(\([^)]*\))?:' | sed 's/^perf[^:]*: //' || true)
            [ -n "$PERF" ] && echo "### ⚡ Performance" && while IFS= read -r l; do [ -n "$l" ] && echo "- $l"; done <<< "$PERF" && echo ""

            REFACTORS=$(git log "$RANGE" --format="%s" | grep -E '^refactor(\([^)]*\))?:' | sed 's/^refactor[^:]*: //' || true)
            [ -n "$REFACTORS" ] && echo "### 🔧 Refactoring" && while IFS= read -r l; do [ -n "$l" ] && echo "- $l"; done <<< "$REFACTORS" && echo ""

            DOCS=$(git log "$RANGE" --format="%s" | grep -E '^docs(\([^)]*\))?:' | sed 's/^docs[^:]*: //' || true)
            [ -n "$DOCS" ] && echo "### 📚 Documentation" && while IFS= read -r l; do [ -n "$l" ] && echo "- $l"; done <<< "$DOCS" && echo ""

            MERGES=$(git log "$RANGE" --format="%s" | grep '^Merge pull request' | sed 's/Merge pull request #\([0-9]*\) from [^ ]*/PR #\1/' || true)
            [ -n "$MERGES" ] && echo "### 🔀 Merged Pull Requests" && while IFS= read -r l; do [ -n "$l" ] && echo "- $l"; done <<< "$MERGES" && echo ""

            echo "$COMPARE_URL"
          } > /tmp/release_notes.md

          cat /tmp/release_notes.md

      - name: Create tag and release
        if: steps.bump.outputs.bump != 'none'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEW_TAG="${{ steps.version.outputs.new_tag }}"

          # Create annotated tag
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW_TAG" -m "Release $NEW_TAG"
          git push origin "$NEW_TAG"

          # Create GitHub release (tag already pushed, so use --verify-tag)
          gh release create "$NEW_TAG" \
            --repo "${{ github.repository }}" \
            --title "$NEW_TAG" \
            --notes-file /tmp/release_notes.md \
            --latest \
            --verify-tag

          echo "✅ Released $NEW_TAG"

      - name: Skip message
        if: steps.bump.outputs.bump == 'none'
        run: echo "ℹ️ No releasable commits (only docs/chore/ci). Skipping."
