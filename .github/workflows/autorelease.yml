name: Auto Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'   # only core tags: v1.2.3

permissions:
  contents: write

jobs:
  autorelease:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        run: |
          CURR_TAG="${{ github.ref_name }}"

          # Previous core tag (vX.Y.Z, excluding ext/* and current tag)
          PREV_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' \
            | grep -v '/' \
            | grep -v "^${CURR_TAG}$" \
            | sort -V \
            | tail -1)

          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
            COMPARE_URL=""
          else
            RANGE="${PREV_TAG}..${CURR_TAG}"
            COMPARE_URL="**Full changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${CURR_TAG}"
          fi

          echo "Generating release notes for ${CURR_TAG} (since ${PREV_TAG:-start})"

          {
            echo "## What's Changed in ${CURR_TAG}"
            echo ""

            # Breaking changes (feat!: or BREAKING CHANGE in body)
            BREAKING=$(git log "$RANGE" --format="%s" 2>/dev/null \
              | grep -E '^[a-z]+(\([^)]*\))?!:' || true)
            if [ -n "$BREAKING" ]; then
              echo "### ⚠️ Breaking Changes"
              while IFS= read -r line; do [ -n "$line" ] && echo "- $line"; done <<< "$BREAKING"
              echo ""
            fi

            # New features
            FEATS=$(git log "$RANGE" --format="%s" 2>/dev/null \
              | grep -E '^feat(\([^)]*\))?:' \
              | sed 's/^feat[^:]*: //' || true)
            if [ -n "$FEATS" ]; then
              echo "### ✨ New Features"
              while IFS= read -r line; do [ -n "$line" ] && echo "- $line"; done <<< "$FEATS"
              echo ""
            fi

            # Bug fixes
            FIXES=$(git log "$RANGE" --format="%s" 2>/dev/null \
              | grep -E '^fix(\([^)]*\))?:' \
              | sed 's/^fix[^:]*: //' || true)
            if [ -n "$FIXES" ]; then
              echo "### 🐛 Bug Fixes"
              while IFS= read -r line; do [ -n "$line" ] && echo "- $line"; done <<< "$FIXES"
              echo ""
            fi

            # Performance
            PERF=$(git log "$RANGE" --format="%s" 2>/dev/null \
              | grep -E '^perf(\([^)]*\))?:' \
              | sed 's/^perf[^:]*: //' || true)
            if [ -n "$PERF" ]; then
              echo "### ⚡ Performance"
              while IFS= read -r line; do [ -n "$line" ] && echo "- $line"; done <<< "$PERF"
              echo ""
            fi

            # Refactors
            REFACTORS=$(git log "$RANGE" --format="%s" 2>/dev/null \
              | grep -E '^refactor(\([^)]*\))?:' \
              | sed 's/^refactor[^:]*: //' || true)
            if [ -n "$REFACTORS" ]; then
              echo "### 🔧 Refactoring"
              while IFS= read -r line; do [ -n "$line" ] && echo "- $line"; done <<< "$REFACTORS"
              echo ""
            fi

            # Documentation
            DOCS=$(git log "$RANGE" --format="%s" 2>/dev/null \
              | grep -E '^docs(\([^)]*\))?:' \
              | sed 's/^docs[^:]*: //' || true)
            if [ -n "$DOCS" ]; then
              echo "### 📚 Documentation"
              while IFS= read -r line; do [ -n "$line" ] && echo "- $line"; done <<< "$DOCS"
              echo ""
            fi

            # CI/Build (removed/deprecated)
            REMOVED=$(git log "$RANGE" --format="%s" 2>/dev/null \
              | grep -iE '^(chore|build).*remov|deprecat' \
              | sed 's/^[^:]*: //' || true)
            if [ -n "$REMOVED" ]; then
              echo "### 🗑️ Removed / Deprecated"
              while IFS= read -r line; do [ -n "$line" ] && echo "- $line"; done <<< "$REMOVED"
              echo ""
            fi

            # Merge commits summary (PRs merged)
            MERGES=$(git log "$RANGE" --format="%s" 2>/dev/null \
              | grep '^Merge pull request' \
              | sed 's/Merge pull request #\([0-9]*\) from [^ ]*/PR #\1/' || true)
            if [ -n "$MERGES" ]; then
              echo "### 🔀 Merged Pull Requests"
              while IFS= read -r line; do [ -n "$line" ] && echo "- $line"; done <<< "$MERGES"
              echo ""
            fi

            if [ -n "$COMPARE_URL" ]; then
              echo "$COMPARE_URL"
            fi

          } > /tmp/release_notes.md

          cat /tmp/release_notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"

          # Create or update the release
          if gh release view "$TAG" --repo "${{ github.repository }}" > /dev/null 2>&1; then
            echo "Release $TAG already exists — updating notes"
            gh release edit "$TAG" \
              --repo "${{ github.repository }}" \
              --notes-file /tmp/release_notes.md \
              --latest
          else
            echo "Creating new release $TAG"
            gh release create "$TAG" \
              --repo "${{ github.repository }}" \
              --title "$TAG" \
              --notes-file /tmp/release_notes.md \
              --latest \
              --verify-tag
          fi

          echo "✅ Release $TAG published"
