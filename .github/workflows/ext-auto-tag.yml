name: Extension Auto-Tag

on:
  push:
    branches: [master]
    paths:
      - 'ext/**'
    paths-ignore:
      - 'ext/**/go.sum'
      - '**.md'

permissions:
  contents: write

jobs:
  tag-extensions:
    name: Tag changed extension modules
    runs-on: ubuntu-latest
    if: |
      !startsWith(github.event.head_commit.message, 'chore(release)') &&
      github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Tag changed extension modules
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Discover all ext modules by finding go.mod files under ext/
          mapfile -t EXT_DIRS < <(find ext -name "go.mod" -exec dirname {} \; | sort)

          TAGGED_ANY=false

          for EXT_DIR in "${EXT_DIRS[@]}"; do
            # e.g. ext/sap -> tag prefix ext/sap/v
            TAG_PREFIX="${EXT_DIR}/v"

            # Find the latest tag for this ext module
            LATEST_TAG=$(git tag -l "${TAG_PREFIX}*" | sort -V | tail -1)
            if [ -z "$LATEST_TAG" ]; then
              LATEST_TAG=""
              VERSION="0.0.0"
            else
              VERSION="${LATEST_TAG#${TAG_PREFIX}}"
            fi

            # Determine commit range - commits touching this ext dir since last tag
            if [ -n "$LATEST_TAG" ]; then
              COMMITS=$(git log "${LATEST_TAG}..HEAD" --format="%s" -- "${EXT_DIR}/" 2>/dev/null || true)
            else
              COMMITS=$(git log --format="%s" -- "${EXT_DIR}/" 2>/dev/null || true)
            fi

            if [ -z "$COMMITS" ]; then
              echo "ℹ️ No changes in ${EXT_DIR} since ${LATEST_TAG:-initial}. Skipping."
              continue
            fi

            echo "Changes in ${EXT_DIR} since ${LATEST_TAG:-initial}:"
            echo "$COMMITS"

            # Determine bump type from conventional commits
            BUMP="none"
            if echo "$COMMITS" | grep -qE '^[a-z]+(\([^)]*\))?!:|BREAKING.CHANGE'; then
              BUMP="major"
            elif echo "$COMMITS" | grep -qE '^feat(\([^)]*\))?:'; then
              BUMP="minor"
            elif echo "$COMMITS" | grep -qE '^(fix|perf|refactor)(\([^)]*\))?:'; then
              BUMP="patch"
            fi

            if [ "$BUMP" = "none" ]; then
              echo "ℹ️ Only docs/chore/ci changes in ${EXT_DIR}. Skipping."
              continue
            fi

            # Bump the version
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)

            case "$BUMP" in
              major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
              patch) PATCH=$((PATCH + 1)) ;;
            esac

            NEW_TAG="${TAG_PREFIX}${MAJOR}.${MINOR}.${PATCH}"
            echo "Creating tag ${NEW_TAG} for ${EXT_DIR} (bump: ${BUMP})"

            # Generate release notes for this ext
            if [ -n "$LATEST_TAG" ]; then
              RANGE="${LATEST_TAG}..HEAD"
            else
              RANGE="HEAD"
            fi

            {
              echo "## ${NEW_TAG}"
              echo ""
              FEATS=$(git log "$RANGE" --format="%s" -- "${EXT_DIR}/" | grep -E '^feat(\([^)]*\))?:' | sed 's/^feat[^:]*: //' || true)
              [ -n "$FEATS" ] && echo "### New Features" && while IFS= read -r l; do [ -n "$l" ] && echo "- $l"; done <<< "$FEATS" && echo ""
              FIXES=$(git log "$RANGE" --format="%s" -- "${EXT_DIR}/" | grep -E '^fix(\([^)]*\))?:' | sed 's/^fix[^:]*: //' || true)
              [ -n "$FIXES" ] && echo "### Bug Fixes" && while IFS= read -r l; do [ -n "$l" ] && echo "- $l"; done <<< "$FIXES" && echo ""
              PERF=$(git log "$RANGE" --format="%s" -- "${EXT_DIR}/" | grep -E '^perf(\([^)]*\))?:' | sed 's/^perf[^:]*: //' || true)
              [ -n "$PERF" ] && echo "### Performance" && while IFS= read -r l; do [ -n "$l" ] && echo "- $l"; done <<< "$PERF" && echo ""
              echo "**Module**: \`github.com/jhonsferg/traverse/${EXT_DIR}\`"
              if [ -n "$LATEST_TAG" ]; then
                echo "**Full changelog**: https://github.com/${{ github.repository }}/compare/${LATEST_TAG}...${NEW_TAG}"
              fi
            } > /tmp/ext_release_notes.md

            # Create annotated tag and release
            git tag -a "${NEW_TAG}" -m "Release ${NEW_TAG}"
            git push origin "${NEW_TAG}"

            gh release create "${NEW_TAG}" \
              --repo "${{ github.repository }}" \
              --title "${NEW_TAG}" \
              --notes-file /tmp/ext_release_notes.md \
              --latest=false \
              --verify-tag

            echo "✅ Released ${NEW_TAG}"
            TAGGED_ANY=true
          done

          if [ "$TAGGED_ANY" = "false" ]; then
            echo "ℹ️ No extension modules needed tagging."
          fi
