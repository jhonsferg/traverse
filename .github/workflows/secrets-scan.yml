name: TruffleHog Secrets Scanning

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  pull_request_target:
    branches:
      - main
      - master

permissions:
  contents: read
  security-events: write
  statuses: write
  pull-requests: write

jobs:
  trufflehog-scan:
    name: Scan for Secrets & Credentials
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog filesystem scan
        uses: trufflesecurity/trufflehog@main
        continue-on-error: true
        with:
          path: ./
          extra_args: --debug --json

      - name: TruffleHog Git history scan
        id: trufflehog-git
        uses: trufflesecurity/trufflehog@main
        continue-on-error: true
        with:
          path: ./
          extra_args: --json --only-verified

      - name: Comment PR on secrets found
        if: github.event_name == 'pull_request' && steps.trufflehog-git.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ **TruffleHog Alert**: Potential secrets or credentials detected in this PR.\n\nPlease review the security scan results and remove any sensitive data before proceeding.'
            });
            core.setFailed('Secrets detected by TruffleHog');

      - name: Generate security report
        if: always()
        run: |
          echo "## 🔐 TruffleHog Secrets Scan Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.trufflehog-git.outcome }}" == "failure" ]; then
            echo "❌ **ALERT**: Potential secrets detected!" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Action Required**:" >> $GITHUB_STEP_SUMMARY
            echo "1. Review the detected secrets" >> $GITHUB_STEP_SUMMARY
            echo "2. Remove sensitive data from the repository" >> $GITHUB_STEP_SUMMARY
            echo "3. If already exposed, rotate credentials immediately" >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ No secrets detected in this scan" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Set commit status
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const state = '${{ steps.trufflehog-git.outcome }}' === 'failure' ? 'failure' : 'success';
            const description = state === 'failure' 
              ? 'Secrets detected - review required' 
              : 'No secrets detected';
            
            github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: state,
              description: description,
              context: 'TruffleHog / Secrets Scan'
            });
