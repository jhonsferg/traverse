name: ext/offline CI

on:
  push:
    branches: [master, feat/offline-store]
    paths:
      - 'ext/offline/**'
      - '.github/workflows/ext-offline-ci.yml'
  pull_request:
    branches: [master]
    paths:
      - 'ext/offline/**'
      - '.github/workflows/ext-offline-ci.yml'

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.go-version }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ["1.25"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: ${{ matrix.go-version }}
          cache: false

      - name: Pin toolchain to installed Go
        run: go env -w GOTOOLCHAIN=local

      - name: Test ext/offline
        env:
          GOWORK: "off"
        run: cd ext/offline && go test -v -race -count=1 ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: "1.25"
          cache: false

      - name: Pin toolchain
        run: go env -w GOTOOLCHAIN=local

      - name: golangci-lint (ext/offline)
        uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9 # v6
        env:
          GOWORK: "off"
        with:
          version: latest
          working-directory: ext/offline
          args: --timeout=3m ./...
