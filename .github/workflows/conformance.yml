name: OData Conformance

on:
  schedule:
    - cron: '0 6 * * 1'   # every Monday at 06:00 UTC
  workflow_dispatch:        # allow manual trigger

permissions:
  contents: read

jobs:
  conformance:
    name: OData TripPin conformance
    runs-on: ubuntu-latest
    continue-on-error: true   # don't block master if external service is down
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5
        with:
          go-version: "1.24"
          cache: false

      - name: Pin toolchain
        run: go env -w GOTOOLCHAIN=local

      - name: Run TripPin conformance tests
        run: go test -v -timeout=120s -tags=conformance ./testutil/...
        env:
          ODATA_TRIPPIN_BASE_URL: https://services.odata.org/TripPinRESTierService
